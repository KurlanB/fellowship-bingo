name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'   # every 3 days at noon UTC
  workflow_dispatch:          # lets you trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl --fail -X GET \
            "${{ secrets.SUPABASE_URL }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
