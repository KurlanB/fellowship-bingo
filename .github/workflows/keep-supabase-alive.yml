name: Ping endpoint

on:
  schedule:
    # Runs every 3 days at 03:00 UTC
    - cron: "0 3 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping GET
        env:
          PING_URL: ${{ secrets.PING_URL }}
        run: |
          curl -fsSL "$PING_URL"
